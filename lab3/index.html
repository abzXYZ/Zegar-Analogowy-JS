<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAK Lab 3</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
        #canvas {
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <label for="particleCount">Ilość cząsteczek</label>
    <input id="particleCount" name="particleCount" type="range" value="10" min="0" max="150" step="1">
    <span id="pCount_value">10</span>
    <br>
    <label for="decay">Szybkość zanikania</label>
    <input id="decay" name="decay" type="range" value="0.025" min="0.001" max="0.1" step="0.001">
    <span id="decay_value">0.025</span>
    <br>
    <input id="auto" name="auto" type="checkbox">
    <label for="auto">Automatyczny pokaz</label>
    <br>
    <canvas id="canvas" width="700" height="700"></canvas>
    <script src="script.js"></script>
</body>
</html>
